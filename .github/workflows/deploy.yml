name: Deploy VitePress site to Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.6.12

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build with VitePress
        run: |
          # 确保在项目根目录执行构建
          cd $GITHUB_WORKSPACE
          pnpm exec vitepress build docs --base /Note/ --clean
          
          # 创建.nojekyll文件（在dist目录内）
          touch docs/.vitepress/dist/.nojekyll
          
          # 验证构建输出
          echo "=== 构建输出目录 ==="
          ls -la docs/.vitepress/dist
          echo "=== index.html 内容 ==="
          head -n 20 docs/.vitepress/dist/index.html
          echo "=== 资源路径检查 ==="
          grep -E 'href=|src=' docs/.vitepress/dist/index.html | head -n 5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
