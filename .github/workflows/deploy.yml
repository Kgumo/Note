name: Deploy VitePress site to Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.6.12

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build with VitePress
        run: |
          # 1. 启用详细日志
          export DEBUG=vitepress:*
          export NODE_OPTIONS="--max-old-space-size=4096"
          
          # 2. 执行构建并捕获日志
          pnpm exec vitepress build docs --base /Note/ --clean --debug 2>&1 | tee build.log
          
          # 3. 检查构建输出
          echo "=== 构建输出目录内容 ==="
          find docs/.vitepress/dist -type f | head -n 20
          
          # 4. 如果 index.html 缺失，使用本地备份
          if [ ! -f "docs/.vitepress/dist/index.html" ]; then
            echo "使用本地备份的 index.html"
            curl -L https://gist.githubusercontent.com/yourusername/backupindex/raw/index.html -o docs/.vitepress/dist/index.html
          fi
          
          # 5. 确保自定义域名配置
          echo "gukmo.cn" > docs/.vitepress/dist/CNAME
          touch docs/.vitepress/dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
