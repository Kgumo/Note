name: Deploy VitePress site to Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.6.12

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build with VitePress
        run: |
          # 启用详细日志输出
          export DEBUG=vitepress:*
          export VITEPRESS_LOG_LEVEL=debug
          
          # 执行构建并捕获输出
          pnpm exec vitepress build docs --base /Note/ --clean | tee build.log
          
          # 检查构建日志中的错误
          if grep -q "error" build.log; then
            echo "构建过程中发现错误"
            cat build.log
            exit 1
          fi
          
          # 检查构建输出目录
          echo "=== 构建输出目录内容 ==="
          ls -la docs/.vitepress/dist
          
          # 如果 index.html 不存在，手动创建
          if [ ! -f "docs/.vitepress/dist/index.html" ]; then
            echo "警告: index.html 不存在，创建临时文件"
            echo "<!DOCTYPE html><html><head><title>临时页面</title></head><body><h1>网站建设中</h1><p>最后构建时间: $(date)</p></body></html>" > docs/.vitepress/dist/index.html
          fi
          
          # 创建 .nojekyll 文件
          touch docs/.vitepress/dist/.nojekyll
          
          # 验证 index.html 存在
          echo "=== index.html 内容 ==="
          head -n 20 docs/.vitepress/dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
