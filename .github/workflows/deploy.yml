name: Deploy VitePress site to Pages

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.6.12

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build with VitePress
        run: |
          # 确保在项目根目录构建
          pnpm exec vitepress build docs --base /Note/ --clean
          
          # 验证构建输出存在
          if [ ! -d "docs/.vitepress/dist" ]; then
            echo "错误：构建输出目录不存在！"
            ls -la docs/.vitepress
            exit 1
          fi
          
          # 创建.nojekyll文件
          touch docs/.vitepress/dist/.nojekyll
          
          # 修复路径问题 - 使用完整路径操作
          sed -i 's|="/|="/Note/|g' docs/.vitepress/dist/index.html
          sed -i 's|/Note/Note/|/Note/|g' docs/.vitepress/dist/index.html
          
          # 验证修改是否成功
          grep '="/Note/' docs/.vitepress/dist/index.html | head -n 3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
